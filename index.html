<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <link rel="stylesheet" type="text/css" href="index.css" />
    <title>
        Mini Pokedex Web
    </title>

</head>

<body>
    <div class="search zone">
        <img src="https://logos-world.net/wp-content/uploads/2020/05/Pokemon-Symbol.jpg"/>
        <div class="searchBar">
            <input id="userinput" class="searchTerm" type="text" placeholder="Escribi el nombre o id">
            <button type="button" onclick="Search()" class="searchButton" id="search"> Search</button>
        </div>
    </div>
    <div class="pokemon zone">
        <h1></h1>
    </div>

    <script src="index.js"></script>
</body>

</html>
